name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.rid }})
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            archive_ext: zip
          - os: ubuntu-latest
            rid: linux-x64
            archive_ext: tar.gz
          - os: macos-latest
            rid: osx-arm64
            archive_ext: tar.gz
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish
        shell: bash
        run: |
          dotnet publish SmartCopy.App/SmartCopy.App.csproj \
            -p:PublishProfile=${{ matrix.rid }} \
            -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Bundle (Windows)
        if: matrix.rid == 'win-x64'
        shell: bash
        run: |
          ARCHIVE="SmartCopy-${{ steps.version.outputs.VERSION }}-win-x64.zip"
          cd artifacts/publish/SmartCopy.App/release_win-x64
          cp "$GITHUB_WORKSPACE/README.md" .
          cp "$GITHUB_WORKSPACE/LICENSE" .
          7z a "$GITHUB_WORKSPACE/$ARCHIVE" SmartCopy.exe README.md LICENSE
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Bundle (Linux/macOS)
        if: matrix.rid != 'win-x64'
        shell: bash
        run: |
          ARCHIVE="SmartCopy-${{ steps.version.outputs.VERSION }}-${{ matrix.rid }}.tar.gz"
          cd artifacts/publish/SmartCopy.App/release_${{ matrix.rid }}
          chmod +x SmartCopy
          cp "$GITHUB_WORKSPACE/README.md" .
          cp "$GITHUB_WORKSPACE/LICENSE" .
          tar -czf "$GITHUB_WORKSPACE/$ARCHIVE" SmartCopy README.md LICENSE
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartCopy-${{ matrix.rid }}
          path: ${{ env.ARCHIVE }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*

  winget:
    name: Submit to Winget
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: vedantmgoyal2009/winget-releaser@v2
        with:
          identifier: machinewrapped.SmartCopy
          installers-regex: 'SmartCopy-.*-win-x64\.zip$'
          token: ${{ secrets.WINGET_TOKEN }}

  homebrew:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: SmartCopy-osx-arm64
          path: dist

      - name: Compute SHA256
        id: sha
        run: |
          FILE=$(ls dist/SmartCopy-*-osx-arm64.tar.gz)
          SHA=$(sha256sum "$FILE" | cut -d ' ' -f1)
          echo "SHA256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: machinewrapped/homebrew-smartcopy
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update cask
        run: |
          sed -i "s/version \".*\"/version \"${{ steps.version.outputs.VERSION }}\"/" tap/Casks/smartcopy.rb
          sed -i "s/sha256 \".*\"/sha256 \"${{ steps.sha.outputs.SHA256 }}\"/" tap/Casks/smartcopy.rb

      - name: Commit and push
        working-directory: tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/smartcopy.rb
          git commit -m "Update SmartCopy to ${{ github.ref_name }}"
          git push
