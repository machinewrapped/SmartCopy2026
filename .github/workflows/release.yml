name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.rid }})
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            archive_ext: zip
          - os: ubuntu-latest
            rid: linux-x64
            archive_ext: tar.gz
          - os: macos-latest
            rid: osx-arm64
            archive_ext: tar.gz
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish
        shell: bash
        run: |
          dotnet publish SmartCopy.App/SmartCopy.App.csproj \
            -p:PublishProfile=${{ matrix.rid }} \
            -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Bundle (Windows)
        if: matrix.rid == 'win-x64'
        shell: pwsh
        run: |
          $archive = "SmartCopy-${{ steps.version.outputs.VERSION }}-win-x64.zip"
          Set-Location "artifacts/publish/SmartCopy.App/release_win-x64"
          Copy-Item "$env:GITHUB_WORKSPACE\README.md" .
          Copy-Item "$env:GITHUB_WORKSPACE\LICENSE" .
          Compress-Archive -Path ".\SmartCopy.exe",".\README.md",".\LICENSE" -DestinationPath "$env:GITHUB_WORKSPACE\$archive" -Force
          Add-Content -Path $env:GITHUB_ENV -Value "ARCHIVE=$archive"

      - name: Bundle (Linux/macOS)
        if: matrix.rid != 'win-x64'
        shell: bash
        run: |
          ARCHIVE="SmartCopy-${{ steps.version.outputs.VERSION }}-${{ matrix.rid }}.tar.gz"
          cd artifacts/publish/SmartCopy.App/release_${{ matrix.rid }}
          chmod +x SmartCopy
          cp "$GITHUB_WORKSPACE/README.md" .
          cp "$GITHUB_WORKSPACE/LICENSE" .
          tar -czf "$GITHUB_WORKSPACE/$ARCHIVE" SmartCopy README.md LICENSE
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartCopy-${{ matrix.rid }}
          path: ${{ env.ARCHIVE }}
          if-no-files-found: error

      - name: Build AppImage
        if: matrix.rid == 'linux-x64'
        run: |
          PUBLISH_DIR="artifacts/publish/SmartCopy.App/release_linux-x64"
          mkdir -p AppDir
          cp "$PUBLISH_DIR/SmartCopy" AppDir/
          chmod +x AppDir/SmartCopy
          cp SmartCopy.UI/Assets/icon.png AppDir/smartcopy.png
          cp .github/appimage/SmartCopy.desktop AppDir/
          cp .github/appimage/AppRun AppDir/
          chmod +x AppDir/AppRun
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/13/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run AppDir "SmartCopy-${{ steps.version.outputs.VERSION }}-x86_64.AppImage"

      - name: Upload AppImage artifact
        if: matrix.rid == 'linux-x64'
        uses: actions/upload-artifact@v4
        with:
          name: SmartCopy-linux-x64-AppImage
          path: SmartCopy-${{ steps.version.outputs.VERSION }}-x86_64.AppImage
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*

  winget:
    name: Submit to Winget
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Check Winget token
        id: winget_token
        run: |
          if [ -n "${{ secrets.WINGET_TOKEN }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Winget token missing notice
        if: steps.winget_token.outputs.enabled != 'true'
        run: echo "::notice::WINGET_TOKEN not set. Skipping Winget submission."

      - uses: vedantmgoyal2009/winget-releaser@v2
        if: steps.winget_token.outputs.enabled == 'true'
        with:
          identifier: machinewrapped.SmartCopy
          installers-regex: 'SmartCopy-.*-win-x64\.zip$'
          token: ${{ secrets.WINGET_TOKEN }}

  homebrew:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Check prerequisites
        id: prereqs
        run: |
          ENABLED=true
          if [ -z "${{ secrets.HOMEBREW_TAP_TOKEN }}" ]; then
            echo "::notice::HOMEBREW_TAP_TOKEN not set. Skipping Homebrew update."
            ENABLED=false
          fi
          if ! git ls-remote "https://github.com/machinewrapped/homebrew-smartcopy.git" > /dev/null 2>&1; then
            echo "::notice::Homebrew tap repo 'machinewrapped/homebrew-smartcopy' not found. Skipping Homebrew update."
            ENABLED=false
          fi
          echo "enabled=$ENABLED" >> "$GITHUB_OUTPUT"

      - name: Download macOS artifact
        if: steps.prereqs.outputs.enabled == 'true'
        uses: actions/download-artifact@v4
        with:
          name: SmartCopy-osx-arm64
          path: dist

      - name: Download Linux artifact
        if: steps.prereqs.outputs.enabled == 'true'
        uses: actions/download-artifact@v4
        with:
          name: SmartCopy-linux-x64
          path: dist

      - name: Compute SHA256
        if: steps.prereqs.outputs.enabled == 'true'
        id: sha
        run: |
          echo "MACOS_SHA=$(sha256sum dist/SmartCopy-*-osx-arm64.tar.gz | cut -d ' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "LINUX_SHA=$(sha256sum dist/SmartCopy-*-linux-x64.tar.gz | cut -d ' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Extract version
        if: steps.prereqs.outputs.enabled == 'true'
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew tap
        if: steps.prereqs.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          repository: machinewrapped/homebrew-smartcopy
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update formula
        if: steps.prereqs.outputs.enabled == 'true'
        run: |
          sed -i "s/version \".*\"/version \"${{ steps.version.outputs.VERSION }}\"/" tap/Formula/smartcopy.rb
          sed -i "s/sha256 \".*\" # macos-arm64/sha256 \"${{ steps.sha.outputs.MACOS_SHA }}\" # macos-arm64/" tap/Formula/smartcopy.rb
          sed -i "s/sha256 \".*\" # linux-x64/sha256 \"${{ steps.sha.outputs.LINUX_SHA }}\" # linux-x64/" tap/Formula/smartcopy.rb

      - name: Commit and push
        if: steps.prereqs.outputs.enabled == 'true'
        working-directory: tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/smartcopy.rb
          git commit -m "Update SmartCopy to ${{ github.ref_name }}"
          git push
